<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
    <title id="title">Browser processing diagram</title><desc id="desc">Files stay on the device while the browser processes and downloads the result.</desc>
    <rect width="1200" height="520" rx="32" fill="#fff1f2"/>
    <g font-family="Arial, sans-serif" text-anchor="middle">
      <rect x="90" y="145" width="230" height="180" rx="28" fill="#fff" stroke="#fecdd3" stroke-width="3"/>
      <text x="205" y="220" font-size="28" font-weight="700" fill="#111827">Your file</text><text x="205" y="265" font-size="20" fill="#64748b">PDF or image</text>
      <path d="M350 235h150" stroke="#e11d48" stroke-width="12" stroke-linecap="round"/><path d="M480 200l45 35-45 35" fill="none" stroke="#e11d48" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="530" y="110" width="260" height="250" rx="30" fill="#fff" stroke="#e11d48" stroke-width="4"/>
      <text x="660" y="205" font-size="30" font-weight="700" fill="#111827">Browser</text><text x="660" y="250" font-size="20" fill="#64748b">Processes locally</text>
      <path d="M820 235h150" stroke="#e11d48" stroke-width="12" stroke-linecap="round"/><path d="M950 200l45 35-45 35" fill="none" stroke="#e11d48" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="1000" y="145" width="120" height="180" rx="28" fill="#fff" stroke="#fecdd3" stroke-width="3"/>
      <text x="1060" y="220" font-size="24" font-weight="700" fill="#111827">Result</text><text x="1060" y="265" font-size="18" fill="#64748b">Download</text>
      <text x="600" y="435" font-size="26" font-weight="700" fill="#be123c">No upload queue. No account required for current tools.</text>
    </g>
  </svg>