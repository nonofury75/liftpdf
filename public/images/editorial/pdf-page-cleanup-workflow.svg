<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PDF page cleanup workflow</title>
  <desc id="desc">A workflow showing blank page removal, page reorder and rotation before final PDF export.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="120" y="130" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Clean up PDF pages before sending</text>
  <text x="120" y="170" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Remove blanks, fix order and rotate scans before final edits.</text>
  <g transform="translate(120 250)">
    <rect width="240" height="280" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="48" y="48" width="58" height="82" rx="8" fill="#fecaca"/>
    <rect x="118" y="48" width="58" height="82" rx="8" fill="#e2e8f0"/>
    <rect x="48" y="144" width="58" height="82" rx="8" fill="#fecaca"/>
    <rect x="118" y="144" width="58" height="82" rx="8" fill="#fecaca"/>
    <path d="M146 73l-26 26M120 73l26 26" stroke="#ef4444" stroke-width="7" stroke-linecap="round"/>
    <text x="42" y="250" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Delete blanks</text>
  </g>
  <g transform="translate(480 250)">
    <rect width="240" height="280" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="48" y="62" width="54" height="76" rx="8" fill="#dbeafe"/>
    <rect x="118" y="44" width="54" height="76" rx="8" fill="#bfdbfe"/>
    <rect x="82" y="154" width="54" height="76" rx="8" fill="#93c5fd"/>
    <path d="M166 158c38 16 45 50 12 76" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
    <path d="m183 226-4 19-18-7" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="250" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Fix order</text>
  </g>
  <g transform="translate(840 250)">
    <rect width="240" height="280" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="72" y="64" width="96" height="132" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="5" transform="rotate(90 120 130)"/>
    <path d="M88 72c54-43 121-24 144 31" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
    <path d="m218 86 19 24-31 5" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="43" y="250" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Rotate scans</text>
  </g>
</svg>
