<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Phone photos to PDF workflow</title>
  <desc id="desc">A visual showing phone photos, receipts and screenshots becoming an ordered PDF document.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="72" y="72" width="1056" height="576" rx="36" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="120" y="142" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Turn phone photos into a PDF</text>
  <text x="120" y="182" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Receipts, screenshots and assignments stay organized as one document.</text>
  <g transform="translate(135 250)">
    <rect x="0" y="0" width="150" height="270" rx="30" fill="#0f172a"/>
    <rect x="15" y="28" width="120" height="200" rx="18" fill="#e0f2fe"/>
    <circle cx="75" cy="246" r="10" fill="#475569"/>
    <path d="M32 178c25-46 48-52 75-18 15-21 30-24 48 8" stroke="#0284c7" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="56" cy="80" r="18" fill="#7dd3fc"/>
  </g>
  <g transform="translate(370 282)">
    <rect width="150" height="190" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="4"/>
    <text x="38" y="55" fill="#c2410c" font-family="Arial, sans-serif" font-size="25" font-weight="700">Receipt</text>
    <line x1="34" y1="88" x2="116" y2="88" stroke="#fb923c" stroke-width="7" stroke-linecap="round"/>
    <line x1="34" y1="120" x2="100" y2="120" stroke="#fb923c" stroke-width="7" stroke-linecap="round"/>
    <line x1="34" y1="152" x2="116" y2="152" stroke="#fb923c" stroke-width="7" stroke-linecap="round"/>
  </g>
  <path d="M570 380h115" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m668 358 30 22-30 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(750 240)">
    <rect width="230" height="300" rx="24" fill="#fef2f2" stroke="#fecaca" stroke-width="3"/>
    <rect x="54" y="42" width="122" height="160" rx="14" fill="#fff" stroke="#ef4444" stroke-width="5"/>
    <line x1="82" y1="86" x2="148" y2="86" stroke="#fca5a5" stroke-width="8" stroke-linecap="round"/>
    <line x1="82" y1="122" x2="148" y2="122" stroke="#fca5a5" stroke-width="8" stroke-linecap="round"/>
    <line x1="82" y1="158" x2="132" y2="158" stroke="#fca5a5" stroke-width="8" stroke-linecap="round"/>
    <text x="78" y="244" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="700">PDF</text>
  </g>
</svg>
