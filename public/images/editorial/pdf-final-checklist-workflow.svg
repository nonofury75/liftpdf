<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Final PDF checklist workflow</title>
  <desc id="desc">A checklist for page order, file size, page numbers and final download before sending a PDF.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="74" y="70" width="1052" height="580" rx="30" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="112" y="132" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Final PDF check before sharing</text>
  <text x="112" y="174" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Review order, size and finishing details before downloading the file.</text>
  <g transform="translate(120 230)">
    <rect width="350" height="330" rx="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <g transform="translate(42 38)">
      <rect width="74" height="96" rx="10" fill="#fff" stroke="#94a3b8"/>
      <rect x="94" width="74" height="96" rx="10" fill="#fff" stroke="#94a3b8"/>
      <rect x="188" width="74" height="96" rx="10" fill="#fff" stroke="#94a3b8"/>
      <text x="26" y="58" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#475569">1</text>
      <text x="120" y="58" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#475569">2</text>
      <text x="214" y="58" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#475569">3</text>
    </g>
    <text x="42" y="188" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#111827">Document preview</text>
    <text x="42" y="224" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Check the first and last pages.</text>
  </g>
  <g transform="translate(540 236)" font-family="Inter, Arial, sans-serif">
    <rect width="500" height="62" rx="16" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="26" y="40" font-size="20" font-weight="800" fill="#15803d">✓ Page order is correct</text>
    <rect y="88" width="500" height="62" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="26" y="128" font-size="20" font-weight="800" fill="#1d4ed8">✓ File size fits upload or email limit</text>
    <rect y="176" width="500" height="62" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="26" y="216" font-size="20" font-weight="800" fill="#c2410c">✓ Page numbers are readable</text>
    <rect y="264" width="500" height="62" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="26" y="304" font-size="20" font-weight="800" fill="#b91c1c">✓ Final PDF downloaded</text>
  </g>
</svg>
