<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Compress PDF without losing quality workflow</title>
  <desc id="desc">A visual workflow showing a large PDF being cleaned, compressed and checked for readability.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="580" rx="36" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="120" y="140" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Compress PDF without losing quality</text>
  <text x="120" y="178" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Clean the document first, compress once, then verify readability.</text>

  <g transform="translate(120 245)">
    <rect width="220" height="300" rx="22" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
    <rect x="52" y="36" width="116" height="148" rx="10" fill="#ffffff" stroke="#fb7185" stroke-width="4"/>
    <line x1="78" y1="74" x2="142" y2="74" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
    <line x1="78" y1="104" x2="142" y2="104" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
    <line x1="78" y1="134" x2="130" y2="134" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
    <text x="38" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Large PDF</text>
    <text x="44" y="266" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Scans, images, extra pages</text>
  </g>

  <path d="M380 390h120" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m485 368 32 22-32 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(520 245)">
    <rect width="220" height="300" rx="22" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="110" cy="96" r="54" fill="#ffffff" stroke="#6366f1" stroke-width="5"/>
    <path d="M82 97h56M110 69v56" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
    <rect x="58" y="174" width="104" height="18" rx="9" fill="#c7d2fe"/>
    <rect x="76" y="204" width="68" height="18" rx="9" fill="#c7d2fe"/>
    <text x="38" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Compress once</text>
    <text x="34" y="266" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Reduce size carefully</text>
  </g>

  <path d="M780 390h120" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m885 368 32 22-32 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(920 245)">
    <rect width="220" height="300" rx="22" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="55" y="46" width="110" height="140" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="4"/>
    <path d="m80 120 22 22 44-58" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Check output</text>
    <text x="35" y="266" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Readable text, valid PDF</text>
  </g>
</svg>
