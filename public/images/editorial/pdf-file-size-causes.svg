<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Common causes of large PDF files</title>
  <desc id="desc">A diagram listing scans, photos, embedded fonts, attachments and duplicate pages as common causes of large PDF files.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="90" y="105" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Why PDFs get large</text>
  <text x="90" y="145" fill="#64748b" font-family="Arial, sans-serif" font-size="22">File size usually has a concrete cause.</text>
  <g font-family="Arial, sans-serif" font-size="25" font-weight="700">
    <rect x="90" y="225" width="300" height="130" rx="24" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="130" y="305" fill="#9a3412">High-resolution scans</text>
    <rect x="450" y="225" width="300" height="130" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
    <text x="490" y="305" fill="#1d4ed8">Full-page photos</text>
    <rect x="810" y="225" width="300" height="130" rx="24" fill="#f5f3ff" stroke="#a78bfa" stroke-width="3"/>
    <text x="850" y="305" fill="#6d28d9">Embedded fonts</text>
    <rect x="270" y="425" width="300" height="130" rx="24" fill="#fef2f2" stroke="#f87171" stroke-width="3"/>
    <text x="310" y="505" fill="#b91c1c">Attachments</text>
    <rect x="630" y="425" width="300" height="130" rx="24" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="670" y="505" fill="#15803d">Duplicate pages</text>
  </g>
</svg>
