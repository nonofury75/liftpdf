<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Save selected PDF pages workflow</title>
  <desc id="desc">Selected pages from a PDF are saved into one focused output PDF.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="72" y="70" width="1056" height="580" rx="30" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="112" y="132" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Save selected pages</text>
  <text x="112" y="174" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Extract only the pages someone needs, then share one smaller PDF.</text>
  <g transform="translate(116 236)">
    <rect width="520" height="310" rx="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <g font-family="Inter, Arial, sans-serif" font-weight="800" text-anchor="middle">
      <rect x="36" y="38" width="92" height="118" rx="12" fill="#fff" stroke="#cbd5e1"/>
      <text x="82" y="104" font-size="22" fill="#64748b">1</text>
      <rect x="154" y="38" width="92" height="118" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="200" y="104" font-size="22" fill="#b91c1c">2</text>
      <rect x="272" y="38" width="92" height="118" rx="12" fill="#fff" stroke="#cbd5e1"/>
      <text x="318" y="104" font-size="22" fill="#64748b">3</text>
      <rect x="390" y="38" width="92" height="118" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="436" y="104" font-size="22" fill="#b91c1c">4</text>
      <rect x="154" y="184" width="92" height="118" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="200" y="250" font-size="22" fill="#b91c1c">5</text>
      <rect x="272" y="184" width="92" height="118" rx="12" fill="#fff" stroke="#cbd5e1"/>
      <text x="318" y="250" font-size="22" fill="#64748b">6</text>
    </g>
  </g>
  <path d="M682 390h128" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M810 390l-24-18v36z" fill="#94a3b8"/>
  <g transform="translate(850 242)">
    <rect width="210" height="304" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <rect x="42" y="44" width="126" height="52" rx="10" fill="#ffffff"/>
    <rect x="42" y="126" width="126" height="52" rx="10" fill="#ffffff"/>
    <rect x="42" y="208" width="126" height="52" rx="10" fill="#ffffff"/>
    <text x="50" y="292" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#991b1b">selected-pages.pdf</text>
  </g>
</svg>
