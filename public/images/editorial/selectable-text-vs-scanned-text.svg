<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Selectable text versus scanned PDF text</title>
  <desc id="desc">A comparison of a searchable PDF with selectable text and a scanned image-only PDF that needs OCR.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="120" y="118" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Selectable text or scanned image?</text>
  <text x="120" y="158" fill="#64748b" font-family="Arial, sans-serif" font-size="20">PDF to Text works when the file already contains real text.</text>

  <g transform="translate(120 230)">
    <rect width="420" height="360" rx="30" fill="#ffffff" stroke="#dbeafe" stroke-width="3"/>
    <text x="46" y="62" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="28" font-weight="700">Searchable PDF</text>
    <rect x="48" y="98" width="324" height="34" rx="8" fill="#dbeafe"/>
    <rect x="48" y="154" width="286" height="22" rx="6" fill="#93c5fd"/>
    <rect x="48" y="196" width="320" height="22" rx="6" fill="#93c5fd"/>
    <rect x="48" y="238" width="248" height="22" rx="6" fill="#93c5fd"/>
    <path d="M316 292h46v46" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <path d="m362 338-70-70" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <text x="48" y="322" fill="#475569" font-family="Arial, sans-serif" font-size="20">Select, copy, extract</text>
  </g>

  <g transform="translate(660 230)">
    <rect width="420" height="360" rx="30" fill="#ffffff" stroke="#fecdd3" stroke-width="3"/>
    <text x="46" y="62" fill="#be123c" font-family="Arial, sans-serif" font-size="28" font-weight="700">Scanned PDF</text>
    <rect x="48" y="98" width="324" height="190" rx="16" fill="#fff1f2" stroke="#fb7185" stroke-width="3"/>
    <path d="M78 244c58-80 104-94 158-35 30-40 66-48 106 23" fill="none" stroke="#fb7185" stroke-width="8" stroke-linecap="round"/>
    <circle cx="132" cy="154" r="24" fill="#fda4af"/>
    <text x="48" y="322" fill="#475569" font-family="Arial, sans-serif" font-size="20">Image-only, OCR needed</text>
  </g>
</svg>
