<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PDF report polish workflow</title>
  <desc id="desc">A diagram showing final PDF report touches such as page numbers, watermark and download.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="82" y="70" width="1036" height="580" rx="36" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="130" y="142" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Polish a PDF before sharing</text>
  <text x="130" y="182" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Finish reports with page numbers, clear labels and a final review.</text>
  <g transform="translate(165 246)">
    <rect width="230" height="310" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="52" y="42" width="126" height="172" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="4"/>
    <text x="77" y="190" fill="#ef4444" font-family="Arial, sans-serif" font-size="18" font-weight="700">Page 1</text>
    <text x="49" y="256" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Page numbers</text>
  </g>
  <g transform="translate(485 246)">
    <rect width="230" height="310" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="52" y="42" width="126" height="172" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="4"/>
    <text x="50" y="138" fill="#4f46e5" font-family="Arial, sans-serif" font-size="22" font-weight="700" transform="rotate(-24 115 130)">CONFIDENTIAL</text>
    <text x="55" y="256" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Watermark</text>
  </g>
  <g transform="translate(805 246)">
    <rect width="230" height="310" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
    <rect x="52" y="42" width="126" height="172" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="4"/>
    <path d="m82 126 25 25 51-68" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="256" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Final PDF</text>
  </g>
</svg>
