<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PDF compression workflow</title>
  <desc id="desc">A workflow diagram showing how PDF compression can reduce images and rebuild document streams while preserving readability.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="90" y="105" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">PDF compression</text>
  <text x="90" y="145" fill="#64748b" font-family="Arial, sans-serif" font-size="22">Reduce what can be safely rebuilt. Do not expect every PDF to shrink.</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="90" y="235" width="260" height="220" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
    <text x="130" y="305" fill="#0f172a">Original PDF</text>
    <rect x="130" y="335" width="180" height="70" rx="14" fill="#fee2e2"/>
    <text x="150" y="380" fill="#b91c1c" font-size="20">Large scans</text>
    <path d="M380 345h120" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    <path d="M480 315l45 30-45 30" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="540" y="205" width="290" height="280" rx="26" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="590" y="270" fill="#9a3412">Rebuild safely</text>
    <text x="585" y="325" fill="#9a3412" font-size="19" font-weight="400">Images</text>
    <text x="585" y="365" fill="#9a3412" font-size="19" font-weight="400">Streams</text>
    <text x="585" y="405" fill="#9a3412" font-size="19" font-weight="400">Unused data</text>
    <path d="M860 345h120" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
    <path d="M960 315l45 30-45 30" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1010" y="235" width="120" height="220" rx="26" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="1030" y="325" fill="#15803d" font-size="22">Smaller</text>
    <text x="1030" y="360" fill="#15803d" font-size="22">PDF</text>
  </g>
</svg>
