<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Password protected PDF diagram</title>
  <desc id="desc">A diagram showing a PDF encrypted with a password before it can be opened.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="110" y="90" width="980" height="540" rx="34" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="150" y="155" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Password-protected PDF</text>
  <text x="150" y="195" fill="#64748b" font-family="Arial, sans-serif" font-size="22">Real protection means encryption, not a visual label.</text>
  <g transform="translate(230 270)">
    <rect width="250" height="250" rx="24" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
    <path d="M82 112V82c0-50 86-50 86 0v30" fill="none" stroke="#b91c1c" stroke-width="16" stroke-linecap="round"/>
    <rect x="62" y="105" width="126" height="90" rx="18" fill="#ef4444"/>
    <circle cx="125" cy="148" r="13" fill="#fff"/>
    <text x="58" y="230" fill="#991b1b" font-family="Arial, sans-serif" font-size="24" font-weight="700">Encrypted</text>
  </g>
  <path d="M520 395h150" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
  <path d="M650 365l45 30-45 30" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(735 270)" font-family="Arial, sans-serif">
    <rect width="250" height="250" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
    <rect x="52" y="58" width="146" height="135" rx="16" fill="#fff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="78" y="88" width="92" height="14" rx="7" fill="#60a5fa"/>
    <rect x="78" y="120" width="74" height="12" rx="6" fill="#bfdbfe"/>
    <rect x="78" y="150" width="98" height="12" rx="6" fill="#bfdbfe"/>
    <text x="62" y="230" fill="#1d4ed8" font-size="24" font-weight="700">Password opens</text>
  </g>
</svg>
