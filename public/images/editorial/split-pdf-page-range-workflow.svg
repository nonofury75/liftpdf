<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Split PDF page range workflow</title>
  <desc id="desc">A PDF document is split into page ranges and separate output files.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="580" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="112" y="132" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Split PDF by page range</text>
  <text x="112" y="174" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Choose page ranges, then generate clean PDF outputs.</text>
  <g transform="translate(120 230)">
    <rect width="230" height="320" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <rect x="35" y="42" width="160" height="42" rx="8" fill="#ffffff"/>
    <rect x="35" y="106" width="160" height="42" rx="8" fill="#ffffff"/>
    <rect x="35" y="170" width="160" height="42" rx="8" fill="#ffffff"/>
    <rect x="35" y="234" width="160" height="42" rx="8" fill="#ffffff"/>
    <text x="78" y="310" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">Original PDF</text>
  </g>
  <path d="M390 390h130" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M520 390l-24-18v36z" fill="#94a3b8"/>
  <g transform="translate(560 246)">
    <rect width="190" height="70" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="46" y="44" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1d4ed8">1-3</text>
    <rect y="102" width="190" height="70" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="52" y="146" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#15803d">4</text>
    <rect y="204" width="190" height="70" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="46" y="248" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#c2410c">5-8</text>
  </g>
  <path d="M790 390h90" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M880 390l-24-18v36z" fill="#94a3b8"/>
  <g transform="translate(920 236)" font-family="Inter, Arial, sans-serif">
    <rect width="150" height="88" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="37" y="54" font-size="18" font-weight="800" fill="#111827">part-1.pdf</text>
    <rect y="116" width="150" height="88" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="37" y="170" font-size="18" font-weight="800" fill="#111827">part-2.pdf</text>
    <rect y="232" width="150" height="88" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="37" y="286" font-size="18" font-weight="800" fill="#111827">part-3.pdf</text>
  </g>
</svg>
