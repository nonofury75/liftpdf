<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PDF password protection workflow</title>
  <desc id="desc">A diagram showing a protected PDF, a known password, and a valid unlocked or protected output.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="76" y="70" width="1048" height="580" rx="36" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="124" y="140" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">PDF password workflow</text>
  <text x="124" y="178" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Protect files with a password, or unlock only when you know the password.</text>

  <g transform="translate(132 245)">
    <rect width="230" height="300" rx="26" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <rect x="68" y="68" width="94" height="112" rx="12" fill="#ffffff" stroke="#f97316" stroke-width="5"/>
    <path d="M86 68V48c0-34 58-34 58 0v20" fill="none" stroke="#f97316" stroke-width="9" stroke-linecap="round"/>
    <circle cx="115" cy="126" r="12" fill="#f97316"/>
    <text x="44" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Protected PDF</text>
    <text x="44" y="266" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Encryption is active</text>
  </g>

  <path d="M405 392h112" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m500 370 32 22-32 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(560 245)">
    <rect width="220" height="300" rx="26" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="110" cy="98" r="50" fill="#ffffff" stroke="#6366f1" stroke-width="5"/>
    <circle cx="91" cy="98" r="12" fill="#6366f1"/>
    <path d="M103 98h60M142 98v26M162 98v18" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
    <text x="43" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Known password</text>
    <text x="42" y="266" fill="#64748b" font-family="Arial, sans-serif" font-size="18">No bypass, no recovery</text>
  </g>

  <path d="M820 392h112" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m915 370 32 22-32 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(972 245)">
    <rect width="110" height="150" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
    <path d="m31 82 18 18 36-48" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-20" y="215" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Valid output</text>
    <text x="-42" y="249" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Test before sharing</text>
  </g>
</svg>
