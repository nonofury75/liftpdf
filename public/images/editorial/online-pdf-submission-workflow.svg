<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Online PDF submission workflow</title>
  <desc id="desc">A workflow showing a PDF checked for file size, page order, readability and upload readiness.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="70" y="72" width="1060" height="576" rx="38" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="118" y="142" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">Make a PDF ready for upload</text>
  <text x="118" y="182" fill="#64748b" font-family="Arial, sans-serif" font-size="20">Check size, pages and readability before submitting online.</text>
  <g transform="translate(122 254)">
    <rect width="190" height="250" rx="24" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
    <rect x="55" y="38" width="80" height="106" rx="10" fill="#fff" stroke="#fb7185" stroke-width="5"/>
    <text x="42" y="196" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">PDF file</text>
    <text x="38" y="226" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Original copy</text>
  </g>
  <path d="M340 380h90" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m414 358 30 22-30 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(470 254)">
    <rect width="190" height="250" rx="24" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="95" cy="80" r="44" fill="#fff" stroke="#6366f1" stroke-width="5"/>
    <path d="M71 81h48M95 57v48" stroke="#6366f1" stroke-width="7" stroke-linecap="round"/>
    <text x="34" y="196" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Reduce size</text>
    <text x="38" y="226" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Compress once</text>
  </g>
  <path d="M690 380h90" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="m764 358 30 22-30 22" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(820 254)">
    <rect width="240" height="250" rx="24" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="44" y="43" width="152" height="92" rx="16" fill="#fff" stroke="#22c55e" stroke-width="5"/>
    <path d="m86 95 28 26 54-60" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="196" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Ready to upload</text>
    <text x="54" y="226" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Readable, valid PDF</text>
  </g>
</svg>
