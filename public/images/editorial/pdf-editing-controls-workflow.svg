<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PDF editing controls workflow</title>
  <desc id="desc">Simple PDF editing controls for rotation, watermarking and page numbering before export.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="580" rx="30" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="112" y="132" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Simple PDF finishing controls</text>
  <text x="112" y="174" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Use focused edits only when they improve the document before sharing.</text>
  <g transform="translate(132 232)">
    <rect width="300" height="340" rx="24" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="60" y="48" width="180" height="240" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="96" y="180" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900" fill="#dc2626" transform="rotate(-28 150 170)">DRAFT</text>
    <text x="132" y="270" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Page 1</text>
  </g>
  <g transform="translate(500 242)" font-family="Inter, Arial, sans-serif">
    <rect width="210" height="78" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="34" y="49" font-size="20" font-weight="800" fill="#1d4ed8">Rotate pages</text>
    <rect y="112" width="210" height="78" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="34" y="161" font-size="20" font-weight="800" fill="#b91c1c">Watermark</text>
    <rect y="224" width="210" height="78" rx="18" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="34" y="273" font-size="20" font-weight="800" fill="#15803d">Page numbers</text>
  </g>
  <path d="M752 402h106" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M858 402l-24-18v36z" fill="#94a3b8"/>
  <g transform="translate(900 278)" font-family="Inter, Arial, sans-serif">
    <rect width="170" height="250" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <rect x="42" y="48" width="86" height="116" rx="10" fill="#ffffff"/>
    <text x="42" y="210" font-size="18" font-weight="800" fill="#991b1b">finished.pdf</text>
  </g>
</svg>
